{{define "pipeline-graph"}}
{{$layout := pipelineGraph .Build.Steps}}
{{if $layout}}
<div class="overflow-x-auto bg-gray-50 rounded-lg p-6 mb-4">
  <svg width="{{$layout.Width}}" height="{{$layout.Height}}" xmlns="http://www.w3.org/2000/svg">
    <!-- Edges (behind everything) -->
    {{range $layout.Edges}}
    <path d="{{edgePath .}}" stroke="#D1D5DB" stroke-width="2" fill="none"/>
    {{end}}

    <!-- Connection dots -->
    {{range $layout.Groups}}
    {{if gt .Column 0}}
    <circle cx="{{.LeftX}}" cy="{{.LeftY}}" r="4" fill="#D1D5DB"/>
    {{end}}
    {{if lt (add .Column 1) (len $layout.Groups)}}
    <circle cx="{{.RightX}}" cy="{{.RightY}}" r="4" fill="#D1D5DB"/>
    {{end}}
    {{end}}

    <!-- Groups -->
    {{range $layout.Groups}}
    <rect x="{{.X}}" y="{{.Y}}" width="{{.Width}}" height="{{.Height}}"
          rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>

    {{range .Nodes}}
    {{$cx := add .X 10}}
    {{$cy := add .Y 18}}
    {{$color := statusColor .Status}}
    {{$icon := statusIcon .Status}}

    <!-- Status icon background -->
    <circle cx="{{$cx}}" cy="{{$cy}}" r="8"
      fill="{{if eq $color "green"}}#22c55e{{else if eq $color "red"}}#ef4444{{else if eq $color "blue"}}#3b82f6{{else if eq $color "yellow"}}#eab308{{else if eq $color "purple"}}#a855f7{{else}}#9ca3af{{end}}"
      opacity="0.15"/>

    {{if eq $icon "check"}}
    <polyline points="{{sub $cx 3}},{{$cy}} {{sub $cx 1}},{{add $cy 3}} {{add $cx 4}},{{sub $cy 3}}"
      fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    {{else if eq $icon "x"}}
    <line x1="{{sub $cx 3}}" y1="{{sub $cy 3}}" x2="{{add $cx 3}}" y2="{{add $cy 3}}"
      stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="{{add $cx 3}}" y1="{{sub $cy 3}}" x2="{{sub $cx 3}}" y2="{{add $cy 3}}"
      stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    {{else if eq $icon "spinner"}}
    <circle cx="{{$cx}}" cy="{{$cy}}" r="5" fill="none"
      stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="8 6">
      <animateTransform attributeName="transform" type="rotate"
        values="0 {{$cx}} {{$cy}};360 {{$cx}} {{$cy}}"
        dur="1s" repeatCount="indefinite"/>
    </circle>
    {{else if eq $icon "clock"}}
    <circle cx="{{$cx}}" cy="{{$cy}}" r="5" fill="none" stroke="#eab308" stroke-width="1.5"/>
    <line x1="{{$cx}}" y1="{{sub $cy 3}}" x2="{{$cx}}" y2="{{$cy}}"
      stroke="#eab308" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="{{$cx}}" y1="{{$cy}}" x2="{{add $cx 3}}" y2="{{$cy}}"
      stroke="#eab308" stroke-width="1.5" stroke-linecap="round"/>
    {{else if eq $icon "slash"}}
    <circle cx="{{$cx}}" cy="{{$cy}}" r="5" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="{{sub $cx 3}}" y1="{{add $cy 3}}" x2="{{add $cx 3}}" y2="{{sub $cy 3}}"
      stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
    {{else if eq $icon "pause"}}
    <line x1="{{sub $cx 2}}" y1="{{sub $cy 4}}" x2="{{sub $cx 2}}" y2="{{add $cy 4}}"
      stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    <line x1="{{add $cx 2}}" y1="{{sub $cy 4}}" x2="{{add $cx 2}}" y2="{{add $cy 4}}"
      stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    {{else}}
    <circle cx="{{$cx}}" cy="{{$cy}}" r="5" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
    {{end}}

    <!-- Step name -->
    <text x="{{add .X 24}}" y="{{add .Y 22}}" font-family="system-ui, -apple-system, sans-serif"
      font-size="13" fill="#111827">{{.Name}}</text>

    <!-- Duration -->
    {{if .Duration}}
    <text x="{{add .X 220}}" y="{{add .Y 22}}" font-family="system-ui, -apple-system, sans-serif"
      font-size="11" fill="#9ca3af" text-anchor="end">{{.Duration}}</text>
    {{end}}
    {{end}}
    {{end}}
  </svg>
</div>
{{end}}
{{end}}
